        }

            height: 44px;
            padding: 0 20px;
            background: #fff;
            color: #1a5cff;
            border: 1px solid #1a5cff;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: none; /* Initially hidden */
        }

        .chain-box {

        }
        .idiom-arrow {

        }
        .instructions h3 {
            font-size: 16px;

            margin-bottom: 12px;
        }
        .instructions p {
            font-size: 14px;
            color: #666;
            line-height: 1.8;

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="tool-header">
                <h1 class="tool-title">成语接龙</h1>
            </div>

            <div class="jielong-container">
                <div class="input-group">
                    <input type="text" class="input-box" id="idiomInput" placeholder="输入成语，开始接龙">
                    <button class="btn-start" id="btnStart">开始接龙</button>
                    <button class="btn-change" id="btnChange">换一换</button>
                </div>

                <div class="result-area" id="resultArea">
                    <div class="chain-box" id="chainBox">
                        <!-- JS renders here -->
                    </div>
                </div>
            </div>

            <div class="instructions">
                <h3>工具介绍及使用方法</h3>
                <p>成语接龙工具可以帮助您进行成语接龙游戏，提升您的汉语词汇量和语言表达能力。通过这款工具，您可以输入一个成语，工具会自动生成下一个接龙成语，帮助您继续游戏，适用于学习、娱乐和语言训练等场景。</p>
            </div>

    <script>
        const btnStart = document.getElementById('btnStart');
        const btnChange = document.getElementById('btnChange');
        const idiomInput = document.getElementById('idiomInput');
        const resultArea = document.getElementById('resultArea');
        const chainBox = document.getElementById('chainBox');

        // Mock database
        const idiomsDict = {
            '一马当先': ['先见之明', '明知故问', '问心无愧', '愧不敢当', '当机立断'],
            '一鸣惊人': ['人定胜天', '天长地久', '久别重逢', '逢凶化吉', '吉星高照'],
            '默认': ['行云流水', '水落石出', '出生入死', '死里逃生', '生离死别']
        };

        function renderChain(startWord) {
            resultArea.style.display = 'block';
            btnChange.style.display = 'block';
            
            const chain = idiomsDict[startWord] || idiomsDict['默认'];
            
            let html = `<div class="idiom-item">${startWord || '默认成语'}</div>`;
            chain.forEach(idiom => {
                html += `
                    <div class="idiom-arrow">➔</div>
                    <div class="idiom-item">${idiom}</div>
                `;
            });
            chainBox.innerHTML = html;
        }

        btnStart.addEventListener('click', () => {
            const val = idiomInput.value.trim();
            if(val) {
                renderChain(val);
            } else {
                alert('请输入一个成语');
            }
        });

        btnChange.addEventListener('click', () => {
            // Mock changing logic by shuffling
            const val = idiomInput.value.trim() || '随机成语';
            const chain = [...(idiomsDict['默认'])].reverse();
            
            let html = `<div class="idiom-item">${val}</div>`;
            chain.forEach(idiom => {
                html += `
                    <div class="idiom-arrow">➔</div>
                    <div class="idiom-item">${idiom}</div>
                `;
            });
            chainBox.innerHTML = html;
        });
    </script>
