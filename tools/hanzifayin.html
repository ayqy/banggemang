    document.addEventListener('DOMContentLoaded', () => {
      renderLeftNav('education');
      const recommendTools = educationTools.filter(t => t.id !== 'hanzifayin').slice(0, 4);
      renderRecommendTools(recommendTools, '#recommendGrid');
      
      const charInput = document.getElementById('charInput');
      const searchBtn = document.getElementById('searchBtn');
      const clearBtn = document.getElementById('clearBtn');
      const playBtn = document.getElementById('playBtn');
      const result = document.getElementById('result');
      const charDisplay = document.getElementById('charDisplay');
      const pinyinDisplay = document.getElementById('pinyinDisplay');
      const infoDisplay = document.getElementById('infoDisplay');
      
      let currentPinyin = '';
      
      function searchChar(char) {
        if (!char || char.length === 0) return null;
        // 支持单字查询
        const firstChar = char[0];
        return charData[firstChar] || null;
      }
      
      function displayResult(char, data) {
        if (!data) {
          result.style.display = 'none';
          playBtn.disabled = true;
          alert('暂不支持该字的查询');
          return;
        }
        
        charDisplay.textContent = char;
        pinyinDisplay.textContent = data.pinyin;
        infoDisplay.textContent = data.info;
        result.style.display = 'block';
        currentPinyin = data.pinyin;
        playBtn.disabled = false;
      }
      
      function speak() {
        if (!currentPinyin) return;
        
        // 使用浏览器语音合成
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(currentPinyin);
          utterance.lang = 'zh-CN';
          utterance.rate = 0.8;
          speechSynthesis.speak(utterance);
        } else {
          alert('您的浏览器不支持语音播放');
        }
      }
      
      searchBtn.addEventListener('click', () => {
        const char = charInput.value.trim();
        const data = searchChar(char);
        displayResult(char[0], data);
      });
      
      charInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const char = charInput.value.trim();
          const data = searchChar(char);
          displayResult(char[0], data);
        }
      });
      
      clearBtn.addEventListener('click', () => {
        charInput.value = '';
        result.style.display = 'none';
        playBtn.disabled = true;
        currentPinyin = '';
        charInput.focus();
      });
      
      playBtn.addEventListener('click', speak);
    });
