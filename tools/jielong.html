          <p><strong>使用方法：</strong></p>

      '马': ['马到成功', '马不停蹄', '马首是瞻', '马马虎虎'],
      '功': ['功成名就', '功德无量', '功亏一篑', '功不可没'],
      '就': ['就地取材', '就事论事', '就义成仁'],
      '红': ['红红火火', '红颜薄命', '红光满面'],
      '火': ['火树银花', '火烧眉毛', '火眼金睛', '火中取栗'],
      '花': ['花好月圆', '花言巧语', '花团锦簇', '花枝招展'],
      '圆': ['圆首方足', '圆孔方木'],
      '月': ['月下老人', '月明星稀', '月圆花好', '月黑风高'],
      '明': ['明察秋毫', '明知故问', '明辨是非', '明枪暗箭'],
      '是': ['是非曲直', '是非分明', '是可忍孰不可忍'],
      '直': ['直截了当', '直言不讳', '直抒己见'],
      '当': ['当机立断', '当之无愧', '当仁不让', '当头一棒'],
      '断': ['断章取义', '断断续续', '断井颓垣'],
      '义': ['义不容辞', '义无反顾', '义正词严', '义薄云天']
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderLeftNav('education');
      const recommendTools = educationTools.filter(t => t.id !== 'jielong').slice(0, 4);
      renderRecommendTools(recommendTools, '#recommendGrid');
      
      const inputIdiom = document.getElementById('inputIdiom');
      const startBtn = document.getElementById('startBtn');
      const clearBtn = document.getElementById('clearBtn');
      const resultChain = document.getElementById('resultChain');
      
      function findNextIdiom(lastChar) {
        return idiomsDb[lastChar] || null;
      }
      
      function getFirstChar(idiom) {
        return idiom.charAt(0);
      }
      
      function getLastChar(idiom) {
        return idiom.charAt(idiom.length - 1);
      }
      
      startBtn.addEventListener('click', () => {
        const input = inputIdiom.value.trim();
        if (!input) {
          alert('请输入一个成语');
          return;
        }
        
        const chain = [input];
        let current = input;
        
        // 最多接龙 10 个
        for (let i = 0; i < 10; i++) {
          const lastChar = getLastChar(current);
          const nextIdioms = findNextIdiom(lastChar);
          if (nextIdioms && nextIdioms.length > 0) {
            // 选择一个未使用过的成语
            const nextIdiom = nextIdioms[Math.floor(Math.random() * nextIdioms.length)];
            if (!chain.includes(nextIdiom)) {
              chain.push(nextIdiom);
              current = nextIdiom;
            } else {
              break;
            }
          } else {
            break;
          }
        }
        
        resultChain.innerHTML = chain.join(' → ');
      });
      
      clearBtn.addEventListener('click', () => {
        inputIdiom.value = '';
        resultChain.innerHTML = '';
        inputIdiom.focus();
      });
    });
  </script>
