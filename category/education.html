<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育工具 - 帮小忙，腾讯 QQ 浏览器在线工具箱平台</title>
  <meta name="keywords" content="教育工具，在线工具，学习工具，字帖生成，成语接龙，翻译，元素周期表">
  <meta name="description" content="教育工具分类，提供字帖生成、成语接龙、翻译、元素周期表等多种教育类在线工具，帮助学习和教学。">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/category.css">
  <link rel="shortcut icon" href="/assets/icons/logo.png">
</head>
<body>
  <!-- 左侧导航栏 -->
  <nav class="left-nav">
    <a class="logo-container" href="/">
      <img src="/assets/icons/logo.png" alt="帮小忙">
      <div>
        <span class="title">帮小忙</span>
        <span class="sub-title">腾讯 QQ 浏览器在线工具箱</span>
      </div>
    </a>
    <ul class="category-container">
      <!-- 由 JS 动态生成 -->
    </ul>
  </nav>

  <!-- 左侧导航占位 -->
  <div class="left-nav-placeholder"></div>

  <!-- 主内容区 -->
  <div class="category-page">
    <!-- 顶部搜索区域 -->
    <header class="top-bar">
      <div class="search-container">
        <img class="search-icon" src="/assets/icons/search.png" alt="搜索按钮">
        <input class="search-input" type="text" placeholder="搜索工具" autocomplete="off">
      </div>
      <div class="statistics-text">工具箱已累计帮助了 366490000 人次</div>
    </header>

    <!-- 分类标题 -->
    <div class="category-header">
      <h1 class="category-title">教育工具</h1>
      <p class="category-desc">提供多种教育类在线工具，帮助学习和教学</p>
    </div>

    <!-- 工具列表 -->
    <main class="tool-list-container">
      <div class="tool-grid" id="toolGrid">
        <!-- 由 JS 动态生成 -->
      </div>
    </main>

    <!-- 页脚 -->
    <div class="footer-placeholder-pc"></div>
  </div>

  <!-- 引入数据文件 -->
  <script src="/js/data/categories.js"></script>
  <script src="/js/data/education-tools.js"></script>
  <script src="/js/common.js"></script>
  
  <script>
    // 页面初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 渲染左侧导航（教育工具高亮）
      renderLeftNav('education');
      
      // 渲染工具卡片
      renderToolCards(educationTools, '#toolGrid');
    });
  </script>
</body>
</html>
