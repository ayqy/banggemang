<html><head><meta charset="utf-8"><title>去手写-帮小忙，腾讯QQ浏览器在线工具箱</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}iframe{display:block;width:100%;height:100%;border:0}#fallback{display:none;position:fixed;left:50%;bottom:40px;transform:translateX(-50%);z-index:10;background:rgba(33,40,53,.88);color:#fff;text-decoration:none;padding:12px 16px;border-radius:12px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.24)}#fallback a{color:#9ed0ff}</style></head><body><iframe id="tool-frame" src="https://tool.browser.qq.com/handwriting_erasure.html" allow="clipboard-read; clipboard-write"></iframe><div id="fallback">线上页面加载失败，请 <a href="https://tool.browser.qq.com/handwriting_erasure.html" target="_blank" rel="noreferrer">直接打开线上页</a></div><script>const frame=document.getElementById('tool-frame');const fallback=document.getElementById('fallback');const timer=setTimeout(()=>{if(!frame.dataset.loaded){fallback.style.display='block';}},10000);frame.addEventListener('load',()=>{frame.dataset.loaded='1';clearTimeout(timer);});frame.addEventListener('error',()=>{fallback.style.display='block';});</script></body></html>
